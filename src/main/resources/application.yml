server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: app_core
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/crud_db}
    username: ${SPRING_DATASOURCE_USERNAME:crud}
    password: ${SPRING_DATASOURCE_PASSWORD:crud}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    hibernate:
      ddl-auto: none
  liquibase:
    enabled: ${SPRING_LIQUIBASE_ENABLED:true}
    drop-first: ${SPRING_LIQUIBASE_DROP_FIRST:false}
    change-log: classpath:liquibase/master.xml

application:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173,http://localhost:9000}
  security:
    jwt-base64-secret: ${APP_SECURITY_JWT_BASE64_SECRET:ODljMGVhM2Q1MjM4M2JkNDYxZmRjNjk0NWJkZGFkYWM5ZWQ4NjYyOTY0NWJkMmQ2ZjMzMjFiYzU4Njk3OTQzMw==}
    token-validity-seconds: ${APP_SECURITY_TOKEN_VALIDITY_SECONDS:86400}
