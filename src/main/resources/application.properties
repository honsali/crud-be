
logging.level.ROOT=info

spring.application.name=app_core

spring.data.jpa.repositories.bootstrap-mode=deferred

spring.datasource.hikari.poolName=Hikari
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.validationTimeout=50000
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/crud_db
spring.datasource.username=crud
spring.datasource.password=crud


spring.jpa.show-sql=true
spring.jpa.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.hibernate.ddl-auto = create-drop


spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

spring.liquibase.contexts= dev

application.cache.time-to-live-seconds=3600
application.cache.max-entries=100


application.cors.allowed-origins: http://localhost:3000,http://localhost:9000,
##application.cors.allowed-origin-patterns: *
application.cors.allowed-methods: *
application.cors.allowed-headers: *
application.cors.exposed-headers: Authorization,Link,X-Total-Count,X-app_core-alert,X-app_core-error,X-app_core-params
application.cors.allow-credentials: false   
application.cors.max-age: 1800


application.security.token-validity=P1D
application.security.remember-me-token-validity=P365D
